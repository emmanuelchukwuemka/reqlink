services:
  - type: web
    name: resqlink
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /login
    envVars:
      - key: APP_NAME
        value: ResQLink
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        sync: false        # Set this in Render dashboard — run: php artisan key:generate --show
      - key: APP_URL
        sync: false        # Set to your Render URL e.g. https://resqlink.onrender.com

      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false        # Neon host e.g. ep-xxx.us-east-1.aws.neon.tech
      - key: DB_PORT
        value: 5432
      - key: DB_DATABASE
        sync: false        # Neon database name e.g. neondb
      - key: DB_USERNAME
        sync: false        # Neon username
      - key: DB_PASSWORD
        sync: false        # Neon password
      - key: DB_SSLMODE
        value: require

      - key: CACHE_DRIVER
        value: database
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: database

      - key: LOG_CHANNEL
        value: stderr
